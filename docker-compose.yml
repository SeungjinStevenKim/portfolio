services:
  mysql:
    image: mysql:8
    container_name: portfolio-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: portfolio
      MYSQL_DATABASE: portfolio_db
    ports:
      - "3308:3306"
    volumes:
      - portfolio_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pportfolio"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  portfolio_mysql_data:
